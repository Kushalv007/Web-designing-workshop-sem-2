<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Minecraft Java Edition</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Arial Black", sans-serif;
      }

      body {
        height: 100vh;
        background: url("15f4681c-5d3f-4de5-9383-d6299d710438.png") no-repeat
          center center/cover;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        color: white;
        text-align: center;
      }

      body::before {
        content: "";
        position: absolute;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.55);
        z-index: -1;
      }

      .title {
        font-size: 70px;
        letter-spacing: 4px;
        text-shadow: 4px 4px 0 #000;
      }

      .subtitle {
        font-size: 25px;
        margin-bottom: 40px;
        text-shadow: 2px 2px 0 #000;
      }

      /* Buttons */
      .menu {
        display: flex;
        flex-direction: column;
        gap: 20px;
        width: 350px;
      }

      .menu a {
        text-decoration: none;
        background: #b0b0b0;
        color: black;
        padding: 15px;
        border: 4px solid #3a3a3a;
        box-shadow:
          inset -4px -4px 0 #6b6b6b,
          inset 4px 4px 0 #ffffff;
        font-size: 20px;
        transition: 0.1s;
      }

      .menu a:hover {
        background: #d4d4d4;
        cursor: pointer;
      }

      .menu a:active {
        box-shadow:
          inset 4px 4px 0 #6b6b6b,
          inset -4px -4px 0 #ffffff;
      }

      .bottom {
        margin-top: 40px;
        display: flex;
        gap: 20px;
      }

      .bottom a {
        text-decoration: none;
        background: #b0b0b0;
        color: black;
        padding: 10px 25px;
        border: 4px solid #3a3a3a;
        box-shadow:
          inset -4px -4px 0 #6b6b6b,
          inset 4px 4px 0 #ffffff;
        font-size: 18px;
      }

      .bottom a:hover {
        background: #d4d4d4;
      }

      .version {
        position: absolute;
        bottom: 10px;
        left: 15px;
        font-size: 14px;
      }

      .copyright {
        position: absolute;
        bottom: 10px;
        right: 15px;
        font-size: 14px;
      }

      .bg-video {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        z-index: -2;
      }

      body::before {
        content: "";
        position: fixed;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.5);
        z-index: -1;
      }
    </style>
  </head>

  <body>
    <video autoplay muted loop playsinline class="bg-video">
      <source
        src="WhatsApp Video 2026-02-20 at 8.49.59 PM.mp4"
        type="video/mp4"
      />
    </video>

    <div class="title">MINECRAFT</div>
    <div class="subtitle">Java Edition</div>

    <div class="menu">
      <a href="#singleplayer">Singleplayer</a>
      <a href="#multiplayer">Multiplayer</a>
      <a href="#realms">Minecraft Realms</a>
    </div>

    <div class="bottom">
      <a href="#options">Options...</a>
      <a href="#quit">Quit Game</a>
    </div>

    <div class="version">Minecraft 1.21.1 (Modded)</div>
    <div class="copyright">Copyright Mojang AB. Do not distribute!</div>
  </body>
</html>
